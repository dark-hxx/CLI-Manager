name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "V*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "V__VERSION__"
          releaseName: "CLI-Manager V__VERSION__"
          releaseBody: |
            ## 安装

            下载 Assets 中的 `.msi` 安装包运行即可。

            > 首次安装可能触发 Windows SmartScreen 提示，点击"仍要运行"继续。

            ## 变更日志

            详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)
          releaseDraft: false
          prerelease: false
